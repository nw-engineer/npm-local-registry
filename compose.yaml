name: npm-repo

services:
  verdaccio:
    image: verdaccio/verdaccio:latest
    container_name: npm-backend
    restart: unless-stopped
    environment:
      - VERDACCIO_PORT=4873
    volumes:
      - ./verdaccio/conf:/verdaccio/conf
      - ./verdaccio/storage:/verdaccio/storage
    expose:
      - "4873"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4873/"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: npm-nginx
    restart: unless-stopped
    depends_on:
      verdaccio:
        condition: service_healthy
    ports:
      - "82:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  preload:
    image: node:24-alpine
    depends_on:
      verdaccio:
        condition: service_healthy
    volumes:
      - ./preload:/src:ro
    command: >
      sh -lc '
      mkdir -p /tmp/work &&
      cp /src/package.json /tmp/work/ &&
      if [ -f /src/package-lock.json ]; then
        cp /src/package-lock.json /tmp/work/;
      fi &&
      cd /tmp/work &&
      if [ -f package-lock.json ]; then
        npm ci --ignore-scripts --registry http://verdaccio:4873/;
      else
        npm install --ignore-scripts --registry http://verdaccio:4873/;
      fi
      '
